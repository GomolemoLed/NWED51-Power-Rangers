<!DOCTYPE html>
<html lang="en">
    <head>
        <title></title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link href="css/style.css" rel="stylesheet">
    </head>
    <body>

        <nav>
      <div class="logo"> SADC Morpho Adventures</div>
      <ul>
        <li><a href="#countries">Countries</a></li>
        <li><a href="#weather">Weather</a></li>
        <li><a href="#currency">Currency</a></li>
        <li><a href="#flights">Flights</a></li>
      </ul>
    </nav>

    <section id="hero">
      <h1>Explore Southern Africa With Morpho Adventures</h1>
      <p>Discover travel information for SADC countries</p>
    </section>

        <section id="countries">
      <h2>SADC Countries</h2>
      <div id="countries-container"></div>
    </section>

    <section id="weather">
      <h2>Check Weather</h2>
      <input type="text" id="city-input" placeholder="Enter a city..." />
      <button id="weather-btn">Search</button>
      <div id="weather-result"></div>
    </section>

    <section id="currency">
      <h2>Currency Converter</h2>
      <input type="number" id="amount" placeholder="Amount" />
      <select id="from-currency"></select>
      <select id="to-currency"></select>
      <button id="convert-btn">Convert</button>
      <div id="currency-result"></div>
    </section>
    
    </body>
</html>
